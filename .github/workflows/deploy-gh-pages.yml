name: Deploy GameLab Marketplace

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          node --version
          npm --version
          npm ci || {
            cat /home/runner/.npm/_logs/*-debug-0.log
            exit 1
          }

      - name: Check marketplace catalog
        run: npm run marketplace:check

      - name: Prepare export directory
        run: mkdir -p output/exports

      - name: Build Roblox place
        run: npm run build

      - name: Export static marketplace
        run: npm run marketplace:build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist/site
          cname: autonateai.com
